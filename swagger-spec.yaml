openapi: 3.0.0
paths:
  /struk/scan:
    post:
      operationId: StrukController_scanStruk
      parameters: []
      requestBody:
        required: true
        description: Scan struk dengan gambar dan teks OCR
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ScanStrukDto'
      responses:
        '201':
          description: Struk berhasil diproses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrukResponseDto'
        '400':
          description: Data tidak valid
        '401':
          description: Unauthorized
        '503':
          description: Service AI tidak tersedia
      summary: Scan struk dengan OCR dan AI
      tags: &ref_0
        - struk
  /struk:
    get:
      operationId: StrukController_getDaftarStruk
      parameters:
        - name: bulan
          required: true
          in: query
          schema:
            type: string
        - name: tahun
          required: true
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Daftar struk
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StrukResponseDto'
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Ambil daftar struk pengguna
      tags: *ref_0
  /struk/{id}:
    get:
      operationId: StrukController_getDetailStruk
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Detail struk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrukResponseDto'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - bukan milik pengguna
        '404':
          description: Struk tidak ditemukan
      security:
        - bearer: []
      summary: Ambil detail struk berdasarkan ID
      tags: *ref_0
    patch:
      operationId: StrukController_updateStruk
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStrukDto'
      responses:
        '200':
          description: Struk berhasil diupdate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrukResponseDto'
        '400':
          description: Data tidak valid
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - bukan milik pengguna
        '404':
          description: Struk tidak ditemukan
      security:
        - bearer: []
      summary: Update data struk
      tags: *ref_0
    delete:
      operationId: StrukController_hapusStruk
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Struk berhasil dihapus
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - bukan milik pengguna
        '404':
          description: Struk tidak ditemukan
      security:
        - bearer: []
      summary: Hapus struk beserta gambar dan pengeluaran terkait
      tags: *ref_0
  /struk/{id}/konfirmasi:
    post:
      operationId: StrukController_konfirmasiStruk
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Struk berhasil dikonfirmasi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrukResponseDto'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - bukan milik pengguna
        '404':
          description: Struk tidak ditemukan
      security:
        - bearer: []
      summary: Konfirmasi struk sudah ditinjau
      tags: *ref_0
info:
  title: Snap Notes API
  description: API untuk aplikasi pencatat pengeluaran dari struk belanja
  version: 1.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    ScanStrukDto:
      type: object
      properties:
        rawText:
          type: string
          description: Teks hasil OCR dari Google ML Kit
        penggunaId:
          type: string
          description: ID pengguna (opsional jika endpoint public)
      required:
        - rawText
    ItemStrukResponseDto:
      type: object
      properties:
        id:
          type: string
          description: ID item struk
        namaItem:
          type: string
          description: Nama item
        jumlah:
          type: number
          description: Jumlah item
        hargaSatuan:
          type: number
          description: Harga satuan
        subtotal:
          type: number
          description: Subtotal (jumlah * harga_satuan)
        kategoriId:
          type: string
          description: ID kategori item
        kategoriNama:
          type: string
          description: Nama kategori item
      required:
        - id
        - namaItem
        - jumlah
        - hargaSatuan
        - subtotal
    StrukResponseDto:
      type: object
      properties:
        id:
          type: string
          description: ID struk
        penggunaId:
          type: string
          description: ID pengguna
        kategoriId:
          type: string
          description: ID kategori toko
        kategoriNama:
          type: string
          description: Nama kategori toko
        namaToko:
          type: string
          description: Nama toko/merchant
        tanggalBelanja:
          format: date-time
          type: string
          description: Tanggal belanja
        total:
          type: number
          description: Total keseluruhan
        gambarUrl:
          type: string
          description: URL gambar struk
        sudahDikonfirmasi:
          type: boolean
          description: Status sudah dikonfirmasi
        items:
          description: Daftar item dalam struk
          type: array
          items:
            $ref: '#/components/schemas/ItemStrukResponseDto'
        createdAt:
          format: date-time
          type: string
          description: Tanggal dibuat
        updatedAt:
          format: date-time
          type: string
          description: Tanggal diupdate
      required:
        - id
        - penggunaId
        - namaToko
        - tanggalBelanja
        - total
        - sudahDikonfirmasi
        - items
        - createdAt
        - updatedAt
    UpdateStrukDto:
      type: object
      properties:
        kategoriId:
          type: string
          description: ID kategori toko
        namaToko:
          type: string
          description: Nama toko/merchant
        tanggalBelanja:
          type: string
          description: Tanggal belanja (YYYY-MM-DD)
        total:
          type: number
          description: Total keseluruhan struk

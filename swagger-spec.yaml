openapi: 3.0.0
paths:
  /auth/daftar:
    post:
      operationId: AuthController_daftar
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaftarDto'
      responses:
        '201':
          description: Pengguna berhasil didaftarkan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseDto'
        '401':
          description: Gagal mendaftar
        '409':
          description: Email sudah terdaftar
      summary: Daftar pengguna baru
      tags: &ref_0
        - auth
  /auth/masuk:
    post:
      operationId: AuthController_masuk
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MasukDto'
      responses:
        '200':
          description: Berhasil masuk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseDto'
        '401':
          description: Email atau password salah
      summary: Masuk dengan email dan password
      tags: *ref_0
  /auth/keluar:
    post:
      operationId: AuthController_keluar
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshDto'
      responses:
        '200':
          description: Berhasil keluar
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Keluar dari sesi
      tags: *ref_0
  /auth/refresh:
    post:
      operationId: AuthController_refresh
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshDto'
      responses:
        '200':
          description: Token berhasil di-refresh
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseDto'
        '401':
          description: Refresh token tidak valid
      summary: Refresh access token
      tags: *ref_0
  /auth/profil:
    get:
      operationId: AuthController_getProfil
      parameters: []
      responses:
        '200':
          description: Data profil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilResponseDto'
        '401':
          description: Unauthorized
        '404':
          description: Pengguna tidak ditemukan
      security:
        - bearer: []
      summary: Ambil data profil pengguna
      tags: *ref_0
    patch:
      operationId: AuthController_updateProfil
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfilDto'
      responses:
        '200':
          description: Profil berhasil diupdate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilResponseDto'
        '401':
          description: Unauthorized
        '404':
          description: Pengguna tidak ditemukan
      security:
        - bearer: []
      summary: Update data profil pengguna
      tags: *ref_0
  /struk/scan:
    post:
      operationId: StrukController_scanStruk
      parameters: []
      requestBody:
        required: true
        description: Scan struk dengan gambar dan teks OCR
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ScanStrukDto'
      responses:
        '201':
          description: Struk berhasil diproses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrukResponseDto'
        '400':
          description: Data tidak valid
        '401':
          description: Unauthorized
        '503':
          description: Service AI tidak tersedia
      security:
        - bearer: []
      summary: Scan struk dengan OCR dan AI
      tags: &ref_1
        - struk
  /struk:
    get:
      operationId: StrukController_getDaftarStruk
      parameters:
        - name: bulan
          required: true
          in: query
          schema:
            type: string
        - name: tahun
          required: true
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Daftar struk
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StrukResponseDto'
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Ambil daftar struk pengguna
      tags: *ref_1
  /struk/{id}:
    get:
      operationId: StrukController_getDetailStruk
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Detail struk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrukResponseDto'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - bukan milik pengguna
        '404':
          description: Struk tidak ditemukan
      security:
        - bearer: []
      summary: Ambil detail struk berdasarkan ID
      tags: *ref_1
    patch:
      operationId: StrukController_updateStruk
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStrukDto'
      responses:
        '200':
          description: Struk berhasil diupdate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrukResponseDto'
        '400':
          description: Data tidak valid
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - bukan milik pengguna
        '404':
          description: Struk tidak ditemukan
      security:
        - bearer: []
      summary: Update data struk
      tags: *ref_1
    delete:
      operationId: StrukController_hapusStruk
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Struk berhasil dihapus
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - bukan milik pengguna
        '404':
          description: Struk tidak ditemukan
      security:
        - bearer: []
      summary: Hapus struk beserta gambar dan pengeluaran terkait
      tags: *ref_1
  /struk/{id}/konfirmasi:
    post:
      operationId: StrukController_konfirmasiStruk
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Struk berhasil dikonfirmasi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrukResponseDto'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - bukan milik pengguna
        '404':
          description: Struk tidak ditemukan
      security:
        - bearer: []
      summary: Konfirmasi struk sudah ditinjau
      tags: *ref_1
info:
  title: Snap Notes API
  description: API untuk aplikasi pencatat pengeluaran dari struk belanja
  version: 1.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    DaftarDto:
      type: object
      properties:
        email:
          type: string
          description: Email pengguna
        password:
          type: string
          description: Password pengguna
        namaLengkap:
          type: string
          description: Nama lengkap pengguna
      required:
        - email
        - password
        - namaLengkap
    AuthResponseDto:
      type: object
      properties:
        accessToken:
          type: string
          description: Access token JWT
        refreshToken:
          type: string
          description: Refresh token
        userId:
          type: string
          description: ID pengguna
        email:
          type: string
          description: Email pengguna
      required:
        - accessToken
        - refreshToken
        - userId
        - email
    MasukDto:
      type: object
      properties:
        email:
          type: string
          description: Email pengguna
        password:
          type: string
          description: Password pengguna
      required:
        - email
        - password
    RefreshDto:
      type: object
      properties:
        refreshToken:
          type: string
          description: Refresh token
      required:
        - refreshToken
    ProfilResponseDto:
      type: object
      properties:
        id:
          type: string
          description: ID pengguna
        email:
          type: string
          description: Email pengguna
        namaLengkap:
          type: string
          description: Nama lengkap pengguna
        fotoProfilUrl:
          type: string
          description: URL foto profil
        createdAt:
          format: date-time
          type: string
          description: Tanggal dibuat
        updatedAt:
          format: date-time
          type: string
          description: Tanggal diupdate
      required:
        - id
        - email
        - namaLengkap
        - createdAt
        - updatedAt
    UpdateProfilDto:
      type: object
      properties:
        namaLengkap:
          type: string
          description: Nama lengkap pengguna
        fotoProfilUrl:
          type: string
          description: URL foto profil
    ScanStrukDto:
      type: object
      properties:
        ocrData:
          type: string
          description: Data OCR dalam format JSON string
          example: >-
            {"rawText":"Indomaret

            Jl. Sudirman
            No.1...","imageSize":{"width":1080,"height":1920},"lines":[{"lineIndex":0,"text":"Indomaret","boundingBox":{"left":120,"top":45,"right":420,"bottom":80}}]}
      required:
        - ocrData
    ItemStrukResponseDto:
      type: object
      properties:
        id:
          type: string
          description: ID item struk
        namaItem:
          type: string
          description: Nama item
        jumlah:
          type: number
          description: Jumlah item
        hargaSatuan:
          type: number
          description: Harga satuan
        subtotal:
          type: number
          description: Subtotal (jumlah * harga_satuan)
        kategoriId:
          type: string
          description: ID kategori item
        kategoriNama:
          type: string
          description: Nama kategori item
      required:
        - id
        - namaItem
        - jumlah
        - hargaSatuan
        - subtotal
    StrukResponseDto:
      type: object
      properties:
        id:
          type: string
          description: ID struk
        penggunaId:
          type: string
          description: ID pengguna
        kategoriId:
          type: string
          description: ID kategori toko
        kategoriNama:
          type: string
          description: Nama kategori toko
        namaToko:
          type: string
          description: Nama toko/merchant
        tanggalBelanja:
          format: date-time
          type: string
          description: Tanggal belanja
        total:
          type: number
          description: Total keseluruhan
        gambarUrl:
          type: string
          description: URL gambar struk
        sudahDikonfirmasi:
          type: boolean
          description: Status sudah dikonfirmasi
        items:
          description: Daftar item dalam struk
          type: array
          items:
            $ref: '#/components/schemas/ItemStrukResponseDto'
        createdAt:
          format: date-time
          type: string
          description: Tanggal dibuat
        updatedAt:
          format: date-time
          type: string
          description: Tanggal diupdate
      required:
        - id
        - penggunaId
        - namaToko
        - tanggalBelanja
        - total
        - sudahDikonfirmasi
        - items
        - createdAt
        - updatedAt
    UpdateStrukDto:
      type: object
      properties:
        kategoriId:
          type: string
          description: ID kategori toko
        namaToko:
          type: string
          description: Nama toko/merchant
        tanggalBelanja:
          type: string
          description: Tanggal belanja (YYYY-MM-DD)
        total:
          type: number
          description: Total keseluruhan struk
